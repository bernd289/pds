overrides:
  '@types/node': '^24'
  undici: '^7'
  nodemailer: '^8'
  glob: '^13'
  node-abi: '^4'
  bn.js: '^5'

neverBuiltDependencies: []

minimumReleaseAge: 1440
minimumReleaseAgeExclude:
  - '@atproto/*'
  - '@bsky.app/*'
  - '@atproto-labs/did-resolver@0.3.0'
  - '@atproto-labs/fetch-node@0.3.0'
  - '@atproto-labs/fetch@0.3.0'
  - '@atproto-labs/pipe@0.2.0'
  - '@atproto-labs/simple-store-memory@0.2.0'
  - '@atproto-labs/simple-store-redis@0.1.0'
  - '@atproto-labs/simple-store@0.4.0'
  - '@atproto-labs/xrpc-utils@0.1.0'
allowBuilds:
  better-sqlite3: true
  core-js: true
